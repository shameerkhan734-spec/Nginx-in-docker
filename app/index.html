<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Toy Store</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f8f9fa;
}

header{
    background:#ff69b4;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 10px;
}

.hero{
    text-align:center;
    padding:40px;
    background:#ffe4e1;
}

.hero h1{
    color:#ff1493;
    margin-bottom:10px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:30px;
}

.card{
    background:white;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    overflow:hidden;
    text-align:center;
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card h3{
    margin:10px;
}

.price{
    color:green;
    font-size:20px;
    margin-bottom:10px;
}

button{
    background:#ff69b4;
    color:white;
    border:none;
    padding:10px 15px;
    margin-bottom:15px;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#ff1493;
}

.form-container{
    width:350px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
}

.cart-section,
.payment-section{
    padding:30px;
}

.cart-item{
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:5px;
}

footer{
    text-align:center;
    background:#ff69b4;
    color:white;
    padding:15px;
    margin-top:30px;
}
</style>
</head>
<body>

<header>
<div class="logo">🧸 Baby Toy Store</div>

<nav>
<a href="#products">Products</a>
<a href="#login">Login</a>
<a href="#register">Register</a>
<a href="#cart">Cart (<span id="cartCount">0</span>)</a>
</nav>
</header>

<section class="hero">
<h1>Welcome to Baby Toy Store</h1>
<p>Safe & Educational Toys for Kids</p>
</section>

<section id="products" class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1558060370-d644479cb6f7?w=600" alt="">
<h3>Teddy Bear</h3>
<p class="price">₹499</p>
<button onclick="addToCart('Teddy Bear',499)">Add To Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1515488764276-beab7607c1e6?w=600" alt="">
<h3>Baby Car Toy</h3>
<p class="price">₹699</p>
<button onclick="addToCart('Baby Car Toy',699)">Add To Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1566576912321-d58ddd7a6088?w=600" alt="">
<h3>Building Blocks</h3>
<p class="price">₹899</p>
<button onclick="addToCart('Building Blocks',899)">Add To Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1587654780291-39c9404d746b?w=600" alt="">
<h3>Baby Robot</h3>
<p class="price">₹1199</p>
<button onclick="addToCart('Baby Robot',1199)">Add To Cart</button>
</div>

</section>

<div id="login" class="form-container">
<h2>Login</h2>
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">
<button style="width:100%">Login</button>
</div>

<div id="register" class="form-container">
<h2>Registration</h2>
<input type="text" placeholder="Full Name">
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">
<input type="password" placeholder="Confirm Password">
<button style="width:100%">Register</button>
</div>

<section id="cart" class="cart-section">
<h2>Shopping Cart</h2>
<div id="cartItems"></div>

<h3>Total: ₹<span id="total">0</span></h3>
</section>

<section class="payment-section">
<h2>Payment Details</h2>

<div class="form-container">

<input type="text" placeholder="Card Holder Name">

<input type="text" placeholder="Card Number">

<input type="text" placeholder="MM/YY">

<input type="text" placeholder="CVV">

<button style="width:100%" onclick="checkout()">
Pay Now
</button>

</div>
</section>

<footer>
<p>© 2026 Baby Toy Store. All Rights Reserved.</p>
</footer>

<script>

let cart = [];
let total = 0;

function addToCart(name, price){

cart.push({
name:name,
price:price
});

total += price;

document.getElementById("cartCount").innerText =
cart.length;

document.getElementById("total").innerText =
total;

displayCart();

}

function displayCart(){

let cartItems =
document.getElementById("cartItems");

cartItems.innerHTML = "";

cart.forEach(item => {

cartItems.innerHTML += `
<div class="cart-item">
<h4>${item.name}</h4>
<p>₹${item.price}</p>
</div>
`;

});

}

function checkout(){

if(cart.length === 0){

alert("Cart is Empty!");

return;

}

alert(
"Payment Successful!\nOrder Placed Successfully."
);

cart = [];
total = 0;

document.getElementById("cartItems").innerHTML="";
document.getElementById("cartCount").innerText="0";
document.getElementById("total").innerText="0";

}

</script>

</body>
</html>
