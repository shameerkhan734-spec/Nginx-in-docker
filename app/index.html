<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Toy Store</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f8f9fa;
}

header{
    background:#ff6b81;
    color:white;
    padding:20px;
    text-align:center;
}

nav{
    background:#ff8fa3;
    padding:10px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-weight:bold;
}

.hero{
    text-align:center;
    padding:50px;
    background:#ffe5ec;
}

.hero h1{
    color:#d6336c;
    margin-bottom:10px;
}

.hero p{
    margin-bottom:20px;
}

.hero button{
    background:#ff6b81;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:5px;
    cursor:pointer;
}

.products{
    padding:40px;
}

.products h2{
    text-align:center;
    margin-bottom:30px;
    color:#333;
}

.product-grid{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.card{
    background:white;
    width:250px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    text-align:center;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:8px;
}

.card h3{
    margin:10px 0;
}

.price{
    color:#28a745;
    font-size:20px;
    font-weight:bold;
}

.card button{
    margin-top:10px;
    background:#ff6b81;
    color:white;
    border:none;
    padding:10px;
    width:100%;
    border-radius:5px;
    cursor:pointer;
}

footer{
    margin-top:40px;
    background:#333;
    color:white;
    text-align:center;
    padding:15px;
}
</style>
</head>

<body>

<header>
    <h1>🧸 Baby Toy Store</h1>
    <p>Safe, Fun & Educational Toys for Kids</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Toys</a>
    <a href="#">Offers</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <h1>Welcome to Baby Toy Store</h1>
    <p>Discover amazing toys for your little ones!</p>
    <button>Shop Now</button>
</section>

<section class="products">
    <h2>Featured Toys</h2>

    <div class="product-grid">

        <div class="card">
            <img src="https://via.placeholder.com/250x180?text=Teddy+Bear" alt="">
            <h3>Teddy Bear</h3>
            <p class="price">$15</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250x180?text=Toy+Car" alt="">
            <h3>Toy Car</h3>
            <p class="price">$12</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250x180?text=Building+Blocks" alt="">
            <h3>Building Blocks</h3>
            <p class="price">$20</p>
            <button>Add to Cart</button>
        </div>

    </div>
</section>

<footer>
    <p>© 2026 Baby Toy Store | All Rights Reserved</p>
</footer>

</body>
</html>
